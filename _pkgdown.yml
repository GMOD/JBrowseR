url: https://gmod.github.io/JBrowseR

template:
  params:
    bootswatch: flatly

navbar:
  components:
    home: ~

reference:
  - title: 'Rendering'
    desc: 'Render a JBrowse 2 linear genome view in the console, R Markdown, or Shiny'
  - contents:
      - JBrowseR
      - renderJBrowseR
      - JBrowseROutput
  - title: 'Describing a browser'
    desc: 'Declarative constructors for assemblies, tracks, search, and theme'
  - contents:
      - assembly
      - track
      - tracks
      - track_data_frame
      - text_index
      - theme
  - title: 'Multiple views (synteny, dotplots)'
    desc: 'Render the full app with several views of any type'
  - contents:
      - JBrowseRApp
      - view
      - linear_view
      - synteny_view
      - dotplot_view
      - synteny_track
  - title: 'Advanced'
    desc: 'Full JBrowse config escape hatch'
  - contents:
      - json_config
