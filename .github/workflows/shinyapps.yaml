on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Apps to deploy (space separated, or "all")'
        default: 'all'
  release:
    types: [published]

name: shinyapps

# Deploy the example apps in example_apps/ to shinyapps.io. Manual by default:
# these are demos, and shinyapps.io plans cap how many apps and active hours an
# account gets, so redeploying all of them on every push would be wasteful.
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
      SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
      SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2

      # Plain install.packages from cloud CRAN, not setup-r-dependencies: R
      # stores the *name* of the repo a package came from in its DESCRIPTION,
      # rsconnect copies that into the manifest, and shinyapps.io's builder then
      # fails on "Unsupported url scheme: RSPM/src/contrib/shiny_1.14.0.tar.gz".
      # pak reaches for Posit Package Manager on Linux whatever use-public-rspm
      # says, so the repo has to be pinned here, at install time — setting
      # `repos` at deploy time is too late to relabel installed packages.
      - name: Install dependencies from CRAN
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c(
            "rsconnect", "remotes", "shiny", "bslib", "DT", "crosstalk"
          ))
          # this checkout's JBrowseR, not the CRAN release: rsconnect reinstalls
          # each dependency on the server from wherever the local copy came, and
          # a local build records no remote for it to fetch
          remotes::install_github(paste0("GMOD/JBrowseR@", Sys.getenv("GITHUB_SHA")))
        shell: Rscript {0}

      - name: Deploy
        run: Rscript example_apps/deploy.R ${{ github.event.inputs.apps }}
