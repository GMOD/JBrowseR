on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Apps to deploy (space separated, or "all")'
        default: 'all'
      prune:
        description: 'Remove apps on the account that are not being deployed'
        type: boolean
        default: false
  release:
    types: [published]

name: shinyapps

# Deploy the example apps in example_apps/ to shinyapps.io. Manual by default:
# these are demos, and shinyapps.io plans cap how many apps and active hours an
# account gets, so redeploying all of them on every push would be wasteful.
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
      SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
      SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
      SHINYAPPS_PRUNE: ${{ github.event.inputs.prune }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2

      # Posit Package Manager binaries, but registered under the name CRAN. R
      # stores the repo *name* in each installed package's DESCRIPTION and
      # rsconnect resolves that name against the session's `repos` when it writes
      # the manifest: left as RSPM the builder gets `Unsupported url scheme:
      # RSPM/src/contrib/shiny_1.14.0.tar.gz`, while CRAN resolves to the url
      # deploy.R sets, which it can fetch. Binaries also dodge compiling fs and
      # curl, whose system headers the runner doesn't carry.
      - name: Install dependencies
        run: |
          ppm <- Sys.getenv("RSPM", "https://cloud.r-project.org")
          options(repos = c(CRAN = ppm))
          pkgs <- c("rsconnect", "remotes", "shiny", "bslib", "DT", "crosstalk")
          install.packages(pkgs)
          # this checkout's JBrowseR, not the CRAN release: rsconnect reinstalls
          # each dependency on the server from wherever the local copy came, and
          # a local build records no remote for it to fetch
          remotes::install_github(paste0("GMOD/JBrowseR@", Sys.getenv("GITHUB_SHA")))
          # install.packages only warns when a package fails to build, which
          # otherwise surfaces as a confusing `no package called 'rsconnect'` in
          # the deploy step
          missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]
          if (length(missing) > 0) {
            stop("not installed: ", paste(missing, collapse = ", "))
          }
        shell: Rscript {0}

      - name: Deploy
        run: Rscript example_apps/deploy.R ${{ github.event.inputs.apps }}
